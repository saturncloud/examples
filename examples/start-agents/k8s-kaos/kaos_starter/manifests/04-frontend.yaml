apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaos-frontend
  namespace: kaos-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaos-frontend
  template:
    metadata:
      labels:
        app: kaos-frontend
    spec:
      containers:
      - name: frontend
        image: kaos-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: kaos-system
spec:
  type: NodePort
  selector:
    app: kaos-frontend
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
