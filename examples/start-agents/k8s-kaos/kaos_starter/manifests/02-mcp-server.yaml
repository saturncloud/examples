apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaos-mcp
  namespace: kaos-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaos-mcp
  template:
    metadata:
      labels:
        app: kaos-mcp
    spec:
      containers:
      - name: mcp-server
        image: kaos-mcp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-service
  namespace: kaos-system
spec:
  selector:
    app: kaos-mcp
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
