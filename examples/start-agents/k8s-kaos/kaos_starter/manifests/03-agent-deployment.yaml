apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaos-agent
  namespace: kaos-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaos-agent
  template:
    metadata:
      labels:
        app: kaos-agent
    spec:
      containers:
      - name: agent-engine
        image: kaos-agent:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: kaos-system
spec:
  selector:
    app: kaos-agent
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
